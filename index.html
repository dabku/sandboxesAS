<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Why Your AI Agent Needs a Sandbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 3rem 0 2rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f0f6fc;
      line-height: 1.3;
      margin-bottom: 1rem;
    }

    header p {
      font-size: 1.1rem;
      color: #8b949e;
      max-width: 600px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }

    .cta {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #238636;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .cta:hover { background: #2ea043; }

    .section {
      margin: 3rem 0;
    }

    .section h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #30363d;
    }

    .demos {
      display: grid;
      gap: 0.75rem;
    }

    .demo-card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }
    .demo-card:hover { border-color: #58a6ff; }

    .demo-card .badge {
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      margin-top: 0.15rem;
    }
    .badge.attack  { background: #3d1f1f; color: #f85149; border: 1px solid #f85149; }
    .badge.defense { background: #1a2e1a; color: #3fb950; border: 1px solid #3fb950; }

    .demo-card .demo-num {
      font-size: 0.8rem;
      color: #8b949e;
      flex-shrink: 0;
      margin-top: 0.2rem;
      width: 2.5rem;
    }

    .demo-card .demo-info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 0.25rem;
    }

    .demo-card .demo-info p {
      font-size: 0.85rem;
      color: #8b949e;
      line-height: 1.5;
    }

    footer {
      text-align: center;
      padding: 3rem 0 1rem;
      color: #8b949e;
      font-size: 0.85rem;
    }
    footer a { color: #58a6ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

  <div class="container">

    </header>


    <footer>
      <p>
        View source &amp; run the demos →
